name: Seed EIBOR history

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install xlsx
        run: npm install xlsx@0.18.5 --no-save
      - name: Backfill archive from CBUAE workbooks
        run: node scripts/seed-history.mjs
      - name: Rebuild eibor-data.json
        run: node scripts/update-eibor.mjs
      - name: Commit
        run: |
          git config user.name "eibor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add eibor-data.json eibor-archive.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "EIBOR: seed history from CBUAE workbooks"
            git push
          fi
      - name: Purge jsDelivr
        run: |
          curl -s "https://purge.jsdelivr.net/gh/pedrofintech/eibor-rate-today@main/eibor-data.json" || true
