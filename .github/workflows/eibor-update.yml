name: Update EIBOR

on:
  schedule:
    - cron: "45 8 * * 1-5"
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: eibor-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Playwright Chromium
        run: |
          npm i playwright --no-save
          npx playwright install --with-deps chromium
      - name: Render EIBOR page (real browser)
        run: node scripts/fetch-fragment.mjs || echo "browser render failed; script will try direct/jina"
      - name: Update eibor-data.json
        run: node scripts/update-eibor.mjs
      - name: Commit
        run: |
          rm -f eibor-fragment.html || true
          git config user.name "eibor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add eibor-data.json eibor-archive.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "EIBOR: automatic update"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              sleep 5
            done
          fi
      - name: Purge jsDelivr
        run: |
          curl -s "https://purge.jsdelivr.net/gh/pedrofintech/eibor-rate-today@main/eibor-data.json" || true
